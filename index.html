<head>
    <meta charset="UTF-8">

    <style>
        /* Design Tokens for Axiom (Logical/Structured Theme) */
        :root {
            --bg-dark: #050508;
            --surface-card: rgba(13, 14, 24, 0.75);
            --border-grid: rgba(0, 245, 160, 0.12);
            --text-primary: #ffffff;
            --text-secondary: #717693;
            --neon-green: #00f5a0;
            --neon-indigo: #7000ff;
            --font-mono: 'Courier New', Courier, monospace;
            --font-sans: system-ui, -apple-system, sans-serif;
        }

        /* Page Layout & Cyber Grid Background */
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-dark);
            /* Subtly illuminated background nodes */
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(112, 0, 255, 0.15) 0px, transparent 60%),
                radial-gradient(circle at 50% 70%, rgba(0, 245, 160, 0.08) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 20px;
        }

        .engine-container {
            text-align: center;
            width: 100%;
            max-width: 540px;
            z-index: 2;
        }

        /* Axiom Nested Geometry Logo */
        .logo-box {
            margin-bottom: 30px;
            display: inline-block;
        }
        .axiom-logo {
            width: 110px;
            height: 110px;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        /* Rotates the layered portals on hover */
        .logo-box:hover .axiom-logo {
            transform: scale(1.05);
        }
        .logo-box:hover .inner-square {
            transform: rotate(-45deg);
            transform-origin: 50px 50px;
        }
        .logo-box:hover .mid-square {
            transform: rotate(45deg);
            transform-origin: 50px 50px;
        }

        /* Typography */
        h1 {
            font-family: var(--font-sans);
            font-size: 2.8rem;
            margin: 0 0 4px 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffffff 40%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-family: var(--font-mono);
            color: var(--neon-green);
            font-size: 0.8rem;
            margin: 0 0 40px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        /* Input Interaction Layer */
        .search-field-holder {
            position: relative;
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 100%;
            padding: 18px 24px;
            font-size: 15px;
            font-family: var(--font-sans);
            color: var(--text-primary);
            background: var(--surface-card);
            border: 1px solid var(--border-grid);
            border-radius: 4px; /* Structured square corners instead of round loops */
            outline: none;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 12px rgba(0, 245, 160, 0.2), 0 15px 35px rgba(0, 0, 0, 0.6);
        }
        input[type="text"]::placeholder {
            color: #43485c;
            letter-spacing: 0.5px;
        }

        /* Action Controls */
        .button-row {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button {
            font-family: var(--font-mono);
            padding: 12px 26px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--text-secondary);
        }
        button#executeBtn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
        }
        button#executeBtn:hover {
            background: rgba(0, 245, 160, 0.08);
            box-shadow: 0 0 10px rgba(0, 245, 160, 0.15);
        }
    </style>
</head>

<body>

    <div class="engine-container">
        <!-- Logo Design: Abstract Concentric Portal Geometry -->
        <div class="logo-box">
            <svg class="axiom-logo" viewBox="0 0 100 100" fill="none" xmlns="http://w3.org">
                <!-- Outer Foundation Frame -->
                <rect x="15" y="15" width="70" height="70" rx="2" stroke="url(#indigoGrad)" stroke-width="1.5"/>
                
                <!-- Middle Layer Port (Rotates Right via CSS transition) -->
                <rect class="mid-square" x="27" y="27" width="46" height="46" rx="1" stroke="#00f5a0" stroke-width="1.5" style="transition: transform 0.6s ease;"/>
                
                <!-- Core Layer Target (Rotates Left via CSS transition) -->
                <rect class="inner-square" x="40" y="40" width="20" height="20" stroke="#ffffff" stroke-width="2" style="transition: transform 0.8s ease;"/>
                
                <!-- Crosshair Alignment Vectors -->
                <line x1="50" y1="5" x2="50" y2="10" stroke="#717693" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="50" y1="90" x2="50" y2="95" stroke="#717693" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="5" y1="50" x2="10" y2="50" stroke="#717693" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="90" y1="50" x2="95" y2="50" stroke="#717693" stroke-width="1.5" stroke-linecap="round"/>

                <defs>
                    <linearGradient id="indigoGrad" x1="15" y1="15" x2="85" y2="85" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#7000ff"/>
                        <stop offset="100%" stop-color="#00f5a0"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <!-- Custom Corporate Header -->
        <h1>Axiom</h1>
        <p class="tagline">// Firefox-Google Query Pipeline</p>

        <!-- Functional Target Form -->
        <form id="axiomForm">
            <div class="search-field-holder">
                <input type="text" id="queryInput" placeholder="Input parameters to index..." required autofocus>
            </div>
            <div class="button-row">
                <button type="submit" id="executeBtn">Execute Search</button>
                <button type="button" id="luckyBtn">Direct Route</button>
            </div>
        </form>
    </div>

    <script>
        // System Config: Assembles the request URL segments accurately to prevent routing drops
        const BASE_ENDPOINT = "https://google.com";
        const TRACKING_SUFFIX = "&client=firefox-b-d";

        // Standard Search Event Listener
        document.getElementById('axiomForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const searchTerms = document.getElementById('queryInput').value;
            
            // Injects the search query value before appending tracking strings
            window.location.href = BASE_ENDPOINT + encodeURIComponent(searchTerms) + TRACKING_SUFFIX;
        });

        // "Direct Route" Event Listener
        document.getElementById('luckyBtn').addEventListener('click', function() {
            const searchTerms = document.getElementById('queryInput').value;
            if (searchTerms) {
                // Injects the query parameters plus Google's instant token modifier
                window.location.href = BASE_ENDPOINT + encodeURIComponent(searchTerms) + TRACKING_SUFFIX + "&btnI=1";
            } else {
                document.getElementById('queryInput').focus();
            }
        });
    </script>
</body>
</html>
