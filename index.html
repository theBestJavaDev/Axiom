<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Axiom — Search</title>
  <meta name="description" content="Axiom — a fast, private, keyless search engine with source ranking and website viewer.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b0c12; --bg-2:#101218; --surface:#14161f; --surface-2:#191c27; --surface-3:#1e2230;
      --border:#262a38; --border-2:#313650; --text:#e9ebf2; --text-2:#b4b9c9; --muted:#7d8398; --muted-2:#5b6178;
      --accent:#4f7cff; --accent-2:#8b5cf6; --accent-glow:rgba(79,124,255,.16); --ok:#34d399; --warn:#fbbf24; --err:#f87171;
      --radius:14px; --radius-sm:10px; --radius-full:999px; --font-display:'Space Grotesk',system-ui,sans-serif;
      --font-body:'Inter',system-ui,-apple-system,sans-serif; --font-mono:'JetBrains Mono',ui-monospace,monospace;
      --shadow:0 1px 0 rgba(255,255,255,.03) inset,0 8px 30px rgba(0,0,0,.4); --transition:160ms cubic-bezier(.4,0,.2,1)
    }
    [data-theme="light"]{
      --bg:#f6f7fb; --bg-2:#eef0f6; --surface:#ffffff; --surface-2:#f4f6fb; --surface-3:#eceef6;
      --border:#e2e5ee; --border-2:#d2d6e4; --text:#14161f; --text-2:#3a3f4f; --muted:#6b7186; --muted-2:#8a90a6;
      --accent:#3b63d8; --accent-2:#7c4cd6; --accent-glow:rgba(59,99,216,.12); --shadow:0 1px 0 rgba(255,255,255,.6) inset,0 6px 24px rgba(20,22,31,.08)
    }
    *{box-sizing:border-box;margin:0;padding:0} html,body{height:100%}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.5;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(900px 500px at 80% -10%, rgba(139,92,246,.10), transparent 60%),radial-gradient(700px 500px at 10% 0%, rgba(79,124,255,.10), transparent 55%)}
    a{color:inherit;text-decoration:none} button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    .wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 22px}
    .home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px}
    .brand{display:flex;align-items:center;gap:14px;margin-bottom:24px}
    .brand-name{font-family:var(--font-display);font-weight:700;font-size:42px;letter-spacing:-.02em}
    .brand-name .dot{color:var(--accent)}
    .tagline{color:var(--muted);font-size:14px;margin-top:-8px;margin-bottom:24px;letter-spacing:.02em}
    .searchbox{width:100%;max-width:720px;position:relative}
    .sb-input{width:100%;height:60px;padding:0 64px 0 54px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:17px;outline:none;box-shadow:var(--shadow);transition:var(--transition)}
    .sb-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow),var(--shadow)}
    .sb-icon{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
    .sb-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;display:none;align-items:center;justify-content:center;color:var(--muted)}
    .sb-clear:hover{background:var(--surface-3);color:var(--text)}
    .suggest{list-style:none;margin-top:8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);overflow:hidden;display:none;box-shadow:var(--shadow)}
    .suggest.show{display:block}.suggest li{padding:11px 18px;cursor:pointer;display:flex;gap:10px;align-items:center;color:var(--text-2);font-size:14px}
    .suggest li:hover,.suggest li.active{background:var(--surface-2);color:var(--text)}
    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px;max-width:820px}
    .chip{font-family:var(--font-mono);font-size:12px;padding:7px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);transition:var(--transition)}
    .chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
    .recent{margin-top:24px;width:100%;max-width:720px}.recent h4{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted-2);margin-bottom:10px;font-weight:600}
    .recent-list{display:flex;flex-wrap:wrap;gap:8px}
    .recent-item{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2);padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface-2)}
    .recent-item .x{opacity:.55;color:var(--muted)}
    .foot-note{position:fixed;bottom:14px;left:0;right:0;text-align:center;color:var(--muted-2);font-size:11px;font-family:var(--font-mono);z-index:2}
    .hidden{display:none!important}
    .topbar{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
    .topbar-inner{display:flex;align-items:center;gap:14px;height:60px}
    .tb-logo{display:flex;align-items:center;gap:9px;flex-shrink:0}.tb-logo span{font-family:var(--font-display);font-weight:600;font-size:19px}
    .tb-search{flex:1;position:relative;max-width:660px}.tb-search input{width:100%;height:42px;padding:0 40px 0 40px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;outline:none}
    .tb-search .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
    .tb-iconbtn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:var(--transition);flex-shrink:0}
    .tb-iconbtn:hover{background:var(--surface-3);color:var(--text)}
    .results-page{padding:20px 0 80px}
    .tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--border);overflow-x:auto}
    .tab{padding:9px 16px;font-size:14px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;display:flex;align-items:center;gap:7px}
    .tab.active{color:var(--text);border-bottom-color:var(--accent)}
    .tab .cnt{font-size:11px;color:var(--muted-2);background:var(--surface-2);padding:1px 7px;border-radius:999px}
    .layout{display:grid;grid-template-columns:1fr;gap:22px}
    @media(min-width:960px){.layout.has-panel{grid-template-columns:minmax(0,1fr) 380px}}
    .status-row{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;margin-bottom:16px;font-family:var(--font-mono)}
    .spinner{width:14px;height:14px;border:2px solid var(--border-2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:none}
    .spinner.show{display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .result{padding:15px 0;border-bottom:1px solid var(--border)} .result:last-child{border-bottom:none}
    .r-url{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--muted);margin-bottom:4px}
    .r-host{color:var(--text-2);font-weight:500}
    .r-title{font-size:18px;font-weight:500;color:var(--accent);line-height:1.3;margin-bottom:5px;letter-spacing:-.005em}
    .r-title:hover{text-decoration:underline}
    .r-snip{color:var(--text-2);font-size:14px;line-height:1.55;max-width:72ch}
    .src-badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:3px 8px;border-radius:999px;margin-bottom:8px;color:#fff}
    .src-badge.b-academic{background:#b54708}.src-badge.b-code{background:#1f1f1f;border:1px solid #555}.src-badge.b-book{background:#7c3aed}.src-badge.b-web{background:var(--accent)}.src-badge.b-archive{background:#0f766e}.src-badge.b-encyclopedia{background:#8b5cf6}.src-badge.b-site{background:#2563eb}
    .r-meta{color:var(--accent);font-weight:600;font-size:12px;margin-left:6px}
    .panel,.viewer{border:1px solid var(--border);border-radius:16px;background:var(--surface);box-shadow:var(--shadow)}
    .panel{padding:16px;position:sticky;top:80px}
    .panel h3{font-family:var(--font-display);font-size:18px;margin-bottom:10px}
    .panel .meta{font-size:12px;color:var(--muted);margin-bottom:10px;font-family:var(--font-mono)}
    .panel .launch{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .btn{padding:9px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:14px}
    .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .viewer{margin-top:16px;overflow:hidden}
    .viewer-head{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface-2)}
    .viewer-head .u{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:72%}
    .viewer-frame{width:100%;height:min(72vh,820px);border:0;background:#fff}
    .iframe-blocked{padding:14px;color:var(--text-2);font-size:14px}
    .site-list{display:flex;flex-direction:column;gap:10px}
    .site-row{padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:var(--surface);display:flex;justify-content:space-between;gap:12px;align-items:center}
    .site-row .name{font-weight:600}
    .site-row .domain{font-size:12px;color:var(--muted);font-family:var(--font-mono)}
    .site-row .open{font-size:12px;color:#fff;background:var(--accent);padding:7px 10px;border-radius:999px}
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state h3{font-family:var(--font-display);font-size:18px;color:var(--text-2);margin-bottom:6px;font-weight:500}
    .modal-bg{position:fixed;inset:0;background:rgba(4,5,10,.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}.modal-bg.show{display:flex}
    .modal{width:100%;max-width:640px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.5);max-height:90vh;overflow-y:auto}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface)}
    .modal-head h2{font-family:var(--font-display);font-size:18px;font-weight:600}
    .modal-body{padding:22px}.field{margin-bottom:20px}.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}.field .hint{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5}
    .field input,.field select,.field textarea{width:100%;min-height:40px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg-2);color:var(--text);font-size:14px;outline:none}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--border)} .toggle-row label{font-size:14px;font-weight:500}
    .switch{position:relative;width:42px;height:24px;flex-shrink:0}.switch input{opacity:0;width:0;height:0}.slider{position:absolute;inset:0;background:var(--surface-3);border-radius:999px;transition:var(--transition);cursor:pointer}.slider::before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:var(--text);border-radius:50%;transition:var(--transition)} .switch input:checked + .slider{background:var(--accent)} .switch input:checked + .slider::before{transform:translateX(18px)}
    .modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:10px;position:sticky;bottom:0;background:var(--surface)}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:11px 20px;border-radius:999px;font-size:13px;box-shadow:var(--shadow);z-index:200;opacity:0;pointer-events:none;transition:var(--transition)} .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  </style>
</head>
<body>
<section class="home" id="home">
  <div class="brand"><div class="brand-name">Axiom<span class="dot">.</span></div></div>
  <div class="tagline">Search, browse, and open websites inside Axiom.</div>
  <form class="searchbox" id="homeForm" autocomplete="off">
    <svg class="sb-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="sb-input" id="homeInput" placeholder="Search anything or type a website…">
    <button type="button" class="sb-clear" id="homeClear" aria-label="Clear">×</button>
    <ul class="suggest" id="homeSuggest"></ul>
  </form>
  <div class="chips" id="homeChips"></div>
  <div class="recent hidden" id="recentBlock"><h4>Recent searches</h4><div class="recent-list" id="recentList"></div></div>
  <div class="foot-note">Client-side only. Press / to search.</div>
</section>

<div class="hidden" id="results">
  <header class="topbar"><div class="wrap topbar-inner">
    <a class="tb-logo" href="#" id="tbHome"><span>Axiom</span></a>
    <form class="tb-search" id="tbForm" autocomplete="off">
      <svg class="si" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="tbInput" placeholder="Search…">
    </form>
    <button class="tb-iconbtn" id="settingsBtn">⚙</button>
    <button class="tb-iconbtn" id="themeBtn">◐</button>
  </div></header>
  <main class="wrap results-page">
    <div class="status-row"><span class="spinner" id="spinner"></span><span id="statusText">Ready</span></div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="summary">Summary <span class="cnt" id="cnt-summary"></span></button>
      <button class="tab" data-tab="web">Web <span class="cnt" id="cnt-web"></span></button>
      <button class="tab" data-tab="sites">Sites <span class="cnt" id="cnt-sites"></span></button>
      <button class="tab" data-tab="academic">Academic <span class="cnt" id="cnt-academic"></span></button>
      <button class="tab" data-tab="code">Code <span class="cnt" id="cnt-code"></span></button>
      <button class="tab" data-tab="images">Images <span class="cnt" id="cnt-images"></span></button>
      <button class="tab" data-tab="knowledge">Knowledge <span class="cnt" id="cnt-knowledge"></span></button>
    </nav>
    <div class="layout" id="layout"><div class="col-main" id="mainCol"></div><aside class="col-side" id="sideCol"></aside></div>
  </main>
</div>

<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <div class="modal-head"><h2>Settings</h2><button class="tb-iconbtn" id="closeSettings">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Language</label><select id="setLang"><option value="en">English</option><option value="es">Spanish</option><option value="fr">French</option><option value="de">German</option></select></div>
      <div class="field"><label>Start page sites</label><div class="hint">How many popular sites to keep in the built-in directory.</div><input id="setSiteCount" type="number" min="100" step="100" value="5000"></div>
      <div class="toggle-row"><div><label>Open results in new tab</label><div class="hint">Otherwise open inside Axiom when possible.</div></div><label class="switch"><input type="checkbox" id="setNewtab"><span class="slider"></span></label></div>
      <div class="toggle-row"><div><label>Save search history</label></div><label class="switch"><input type="checkbox" id="setHistory"><span class="slider"></span></label></div>
    </div>
    <div class="modal-foot"><button class="btn" id="clearHistoryBtn">Clear history</button><div style="display:flex;gap:10px"><button class="btn" id="cancelSettings">Cancel</button><button class="btn primary" id="saveSettings">Save</button></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js" defer></script>
</body>
</html>
